services:
  - type: web
    name: hive-receipt
    env: node
    plan: starter
    buildCommand: npm install --production
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SPECTRAL_PRIVKEY_B64
        sync: false
      - key: SPECTRAL_PUBKEY_B64
        sync: false
      # Owner token for GET /v1/site/intelligence. Set the value in the Render
      # dashboard. If unset, that endpoint returns 503 not_configured (closed).
      - key: SITE_INTEL_TOKEN
        sync: false
